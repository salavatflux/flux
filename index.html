<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--f:'Source Code Pro',monospace;--or:#e8501a;--wh:#fff;--bk:#111;--gy:#888;--nh:54px}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--f);background:#1a2a10;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font-family:var(--f);border:none;background:none}
a{text-decoration:none;font-family:var(--f)}
img{display:block}

/* LOGO */
#logo{position:fixed;top:0;left:16px;z-index:9900;height:var(--nh);width:32px;display:flex;align-items:center;justify-content:center;color:var(--wh);transition:color .3s;cursor:pointer}
#logo.dark{color:var(--bk)}
#logo svg{transform:translateY(3px)}

/* NAV DESKTOP */
#navD{display:none;position:fixed;top:0;left:0;right:0;height:var(--nh);z-index:9800;align-items:stretch}
#navD .nb{height:var(--nh);padding:0 28px;font-size:13px;letter-spacing:.13em;color:var(--wh);white-space:nowrap;transition:color .2s,background .2s;display:flex;align-items:center}
#navD .nb:hover{color:rgba(255,255,255,.6)}
#navD .nb.act{background:var(--wh);color:var(--bk)}
#navD .nb.act:hover{color:var(--bk)}
#navD .nb-gap{flex:1}
#navD .nb-logo-gap{width:60px;flex-shrink:0}

/* NAV MOBILE */
#navM{display:none;position:fixed;top:0;left:0;right:0;height:var(--nh);z-index:9800;overflow:hidden}
#navMT{display:flex;width:200%;height:100%;transition:transform .42s cubic-bezier(.25,.46,.45,.94)}
.nmp{width:50%;height:100%;display:flex;align-items:center}
.nmp1{padding-left:58px;gap:2px}
.nmp2{justify-content:flex-end;padding-right:16px}
#navM .nb{height:var(--nh);padding:0 11px;font-size:11.5px;letter-spacing:.10em;color:var(--wh);white-space:nowrap;transition:background .2s,color .2s}
#navM .nb.act{background:var(--wh);color:var(--bk)}

/* HERO */
#hero{position:fixed;inset:0;z-index:1;overflow:hidden}
#bgWrap{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(150deg,#4a6a2a,#7a9e4a 35%,#3a6020 65%,#1a2e08)}
#bgImg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center;transition:object-position .42s cubic-bezier(.25,.46,.45,.94)}

/* BG change label (hover to reveal) */
#bgBtn{display:none}

/* Hero contacts mobile */
#hbM{display:none;position:absolute;bottom:26px;left:0;right:0;height:22px;overflow:hidden}
#hbMT{display:flex;width:200%;transition:transform .42s cubic-bezier(.25,.46,.45,.94)}
.hbp{width:50%;display:flex;align-items:center;gap:24px;padding:0 20px}
/* Hero contacts desktop */
#hbD{display:none;position:absolute;bottom:28px;left:20px;gap:40px}
.cl{font-size:12px;letter-spacing:.07em;color:var(--or);font-style:italic}
#copy{position:fixed;bottom:28px;right:20px;font-size:12px;letter-spacing:.07em;color:#888;z-index:2;pointer-events:none}
.cl:hover{opacity:.7}

/* ══════════════════════════════════════════
   SECTION PANELS

   BUG FIX #1:
   Panel starts at top:var(--nh) — BELOW nav.
   Nav (z:9800) always stays fully visible on top.
   Active nav button = white pill = label for section.
   Back arrow fixed in nav row, z above nav.
══════════════════════════════════════════ */
.sp{
  position:fixed;
  top:var(--nh);left:0;right:0;bottom:0;
  z-index:200;
  background:var(--wh);
  opacity:0;
  pointer-events:none;
  transition:opacity .45s ease;
  display:flex;flex-direction:column;overflow:hidden;
}
.sp.open{opacity:1;pointer-events:auto}

/* ── LIGHTBOX ── */
#zoomOv{display:none;position:fixed;inset:0;z-index:10000;touch-action:none}
#zoomOv.on{display:block}
#zoomOvBg{position:absolute;inset:0;background:rgba(0,0,0,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
#zoomOvImg{position:absolute;display:block;transform-origin:0 0;will-change:transform;user-select:none;-webkit-user-drag:none;touch-action:none}
/* ── OBJECTS ── */
#objOuter{flex:1;position:relative;overflow:hidden}
#objTrk{display:flex;height:100%;transition:transform .5s cubic-bezier(.77,0,.175,1)}
.obj-slide{min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:40px 48px 80px;display:flex;flex-direction:column;align-items:center;touch-action:pan-y}
.obj-slide::-webkit-scrollbar{width:0}
.obj-img{width:100%;max-width:760px;background:#eaeaea;overflow:hidden;margin-bottom:28px;flex-shrink:0}
.obj-img img{width:100%;height:auto}
.obj-row{display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.obj-title{font-size:28px;font-weight:400;letter-spacing:.03em}
.obj-pr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.obj-price{font-size:26px;font-weight:400;letter-spacing:.03em;white-space:nowrap}
.obj-desc{font-size:13px;letter-spacing:.06em;color:#555;margin-top:10px;line-height:1.85}

/* Annotation */
.star{font-size:15px;color:var(--or);padding:0 3px;position:relative;top:-2px;transition:opacity .2s}
.star:hover{opacity:.7}
.obj-info{width:100%;max-width:760px;position:relative}
.ann{display:block;width:100%;max-height:0;overflow:hidden;transition:max-height .35s ease;border:0 solid rgba(0,0,0,.08);font-size:12px;letter-spacing:.05em;color:#666;line-height:1.85;background:#fafaf8;margin-top:0}
.ann.on{max-height:400px;border-width:1px;padding:13px 17px;margin-top:4px}
.ann:empty::before{content:'* здесь будет аннотация';color:#ccc;font-style:italic}
/* Аннотация paper — определена в блоке .pap-* выше */

/* H arrows */
.harr{display:none;position:absolute;top:50%;transform:translateY(-50%);font-size:20px;color:var(--or);padding:16px 12px;opacity:.5;transition:opacity .2s;z-index:5}
.harr:hover{opacity:1}
.harr.dis{opacity:.15;pointer-events:none}
.al{left:4px}.ar{right:4px}

/* ── PAPER CHRONO BAR ── */
#papBar{flex-shrink:0;height:36px;display:flex;align-items:center;padding:0 48px;border-bottom:1px solid rgba(0,0,0,.06);gap:10px}
#papBar button{font-family:var(--f);font-size:10px;letter-spacing:.16em;color:var(--gy);background:none;border:none;cursor:pointer;padding:4px 0;transition:color .2s;white-space:nowrap}
#papBar button:hover{color:var(--bk)}
#papBar button.act{color:var(--or)}
#papBar .pb-sep{color:rgba(0,0,0,.12);font-size:11px}
@media(max-width:767px){#papBar{padding:0 20px}}

/* ── PAPER ── */
#papOuter{flex:1;position:relative;overflow:hidden}
#papTrk{display:flex;height:100%;transition:transform .52s cubic-bezier(.77,0,.175,1);touch-action:pan-x}
.pap-pane{min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.pap-pane::-webkit-scrollbar{width:0}

/* ── Единая ширина блока: W ──
   Мобильный:  W = min(88vw, 340px)
   Десктоп:    картинка W = 260px, текст W = 260px, gap 52px → итого 572px по центру
*/
.pap-layout{width:fit-content;padding:48px 0 64px;box-sizing:border-box;margin:auto;flex-shrink:0;display:flex;flex-direction:column;align-items:center}

/* мобильный — колонка */
.pap-row{display:flex;flex-direction:column;align-items:center;gap:24px}
.pap-img{flex-shrink:0;width:min(88vw,340px);overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.06)}
.pap-info{width:min(88vw,340px);min-width:0}
.ann-pap{width:min(88vw,340px);max-height:0;overflow:hidden;transition:max-height .35s ease,margin-top .35s ease;border:0 solid rgba(0,0,0,.08);font-size:12px;letter-spacing:.05em;color:#666;line-height:1.85;background:#fafaf8}.ann-pap.on{max-height:400px;margin-top:16px;border-width:1px;padding:13px 17px}
.ann-pap:empty::before{content:'* здесь будет аннотация';color:#ccc;font-style:italic}

/* ориентация — все форматы */
.pap-img.orient-h{aspect-ratio:210/148}
.pap-img.orient-v{aspect-ratio:148/210}
.pap-img.orient-h6{aspect-ratio:148/105}
.pap-img.orient-v6{aspect-ratio:105/148}
.pap-img img{width:100%;height:100%;object-fit:contain;background:#f5f5f3}

/* десктоп — строка */
@media(min-width:768px){
  .pap-layout{padding:60px 0 80px}
  .pap-row{flex-direction:row;align-items:stretch;gap:52px;width:572px}
  .pap-img{width:260px;flex-shrink:0}
  .pap-img.orient-v{aspect-ratio:148/210}
  .pap-img.orient-v6{aspect-ratio:105/148}
  .pap-info{width:260px;flex-shrink:0}
  .ann-pap{width:572px;margin-top:0}
  .pap-series-info .ann-pap{width:100%;max-width:480px}
}

.pap-title{font-size:22px;font-weight:400;letter-spacing:.01em;line-height:1.2;margin-bottom:10px}
@media(min-width:768px){.pap-title{font-size:clamp(18px,1.8vw,28px);white-space:nowrap}}
.pap-sl{font-size:13px;letter-spacing:.10em;color:var(--or);margin-bottom:28px;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.pap-sl:hover{opacity:.7}
.pap-d{font-size:13px;letter-spacing:.06em;color:#555;line-height:1.85;margin-bottom:4px}
.pap-pr{display:flex;align-items:center;gap:8px;margin-top:28px}
.pap-price{font-size:clamp(20px,2.2vw,28px);font-weight:400;letter-spacing:.03em}

/* ── DIGITAL ── */
#digOuter{flex:1;position:relative;overflow:hidden}
#digTrk{display:flex;height:100%;transition:transform .5s cubic-bezier(.77,0,.175,1)}
.dig-slide{min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;background-repeat:repeat-y;background-size:100% auto;background-position:top center}
.dig-slide::-webkit-scrollbar{width:0}
.dig-bg{position:absolute;inset:0;background-size:100% auto;background-repeat:repeat-y;background-position:top center;opacity:1;pointer-events:none}
.dig-inner{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:56px 40px 80px}
.dig-h{font-size:clamp(48px,8vw,88px);font-weight:600;font-style:normal;letter-spacing:-.01em;text-align:center;line-height:.9;margin-bottom:8px}
.dig-sub{font-size:12px;letter-spacing:.22em;text-align:center;color:#888;margin-bottom:52px}
.dig-block-text{font-size:14px;letter-spacing:.05em;line-height:2;color:#333;text-align:justify;margin-bottom:32px}
.dig-block-text p+p{margin-top:16px}
.dig-block-img{margin-bottom:0;background:none;padding:0}
.dig-block-img img{width:100%;height:auto;display:block}
.dig-link{display:inline-block;margin-top:16px;font-size:12px;letter-spacing:.15em;color:var(--or);border-bottom:1px solid var(--or);padding-bottom:2px;transition:opacity .2s}
.dig-link:hover{opacity:.6}

/* ── PAPER SERIES VIEW ── */
#papSeries{position:absolute;inset:0;background:#fff;transform:translateX(100%);transition:transform .5s cubic-bezier(.77,0,.175,1);overflow:hidden;display:flex;flex-direction:column}
#papSeries.open{transform:translateX(0)}
#papSeriesHead{flex-shrink:0;padding:0 32px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(0,0,0,.06);height:var(--nh)}
.pap-series-name{font-size:13px;letter-spacing:.18em;color:var(--bk)}
.pap-series-back{font-size:18px;letter-spacing:.12em;color:var(--or);cursor:pointer;background:none;border:none;font-family:var(--f);padding:0 16px 0 0;line-height:1;opacity:.7;transition:opacity .2s}
.pap-series-back:hover{opacity:1}
#papSeriesOuter{flex:1;position:relative;overflow:hidden}
#papSeriesTrk{display:flex;height:100%;transition:transform .5s cubic-bezier(.77,0,.175,1)}
.pap-series-slide{min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pap-series-slide::-webkit-scrollbar{width:0}
.pap-series-layout{width:100%;padding:40px 40px 80px;box-sizing:border-box;margin:0 auto;display:flex;flex-direction:column;align-items:center}
@media(max-width:767px){.pap-series-layout{padding:32px 20px 64px}}
/* image and info SAME max-width — text aligns to image edges */
.pap-series-img{width:100%;max-width:480px;background:#eaeaea;overflow:hidden;margin-bottom:28px;flex-shrink:0;border:1px solid rgba(0,0,0,.06)}
.pap-series-img.orient-h{aspect-ratio:210/148}
.pap-series-img.orient-v{aspect-ratio:148/210}
.pap-series-img.orient-h6{aspect-ratio:148/105}
.pap-series-img.orient-v6{aspect-ratio:105/148}
.pap-series-img img{width:100%;height:100%;object-fit:cover}
/* info row — same as obj-row */
.pap-series-info{width:100%;max-width:480px;position:relative}
/* Hide papOuter arrows when series is open */
#papSeries.open{z-index:10}
#papSeries.open ~ #papOuter .harr,
#papOuter:has(~ #papSeries.open) .harr{opacity:0!important;pointer-events:none!important}
.pap-series-row{display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.pap-series-title{font-size:28px;font-weight:400;letter-spacing:.03em}
@media(max-width:767px){.pap-series-title{font-size:20px}}
.pap-series-meta{font-size:13px;letter-spacing:.06em;color:#555;margin-top:10px;line-height:1.85}
.pap-series-pr{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pap-series-price{font-size:26px;font-weight:400;letter-spacing:.03em;white-space:nowrap}
@media(max-width:767px){.pap-series-price{font-size:18px}}
.pap-series-desc-block{width:100%;max-width:480px;font-size:14px;letter-spacing:.05em;line-height:2;color:#444;padding-top:20px}
#staScroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:56px 0 80px}
#staScroll::-webkit-scrollbar{width:0}
.sta-body{max-width:680px;margin:0 auto;padding:0 40px 80px;font-size:14px;letter-spacing:.05em;line-height:2;color:#333;text-align:justify;text-indent:2em}
.sta-body p{margin-bottom:24px}.sta-body p:last-child{margin-bottom:0}

/* ── CV PANEL (desktop: right-side panel) ── */
@media(min-width:768px){#secCV{left:auto;width:62%;min-width:500px;max-width:760px;box-shadow:-24px 0 80px rgba(0,0,0,.1)}}

/* Content area */
#stContent{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Horizontal drag container */
#stPO{flex:1;overflow:hidden;position:relative;cursor:grab;user-select:none}
#stPO:active{cursor:grabbing}

/* The continuous strip */
#stPT{display:flex;height:100%;align-items:stretch;will-change:transform;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
#stPT.dragging{transition:none}

/* Each exhibition block */
.st-ex-block{
  flex-shrink:0;
  width:100%;
  display:flex;
  flex-direction:column;
  height:100%;
  position:relative;
}

/* Exhibition footer — name + desc at BOTTOM of block */
.st-ex-footer{
  flex-shrink:0;
  order:2;
  padding:14px 20px 20px;
  border-top:1px solid rgba(0,0,0,.06);
}
.st-ex-name{
  font-size:17px;
  letter-spacing:.12em;
  color:var(--bk);
  font-family:var(--f);
  white-space:nowrap;
  margin-bottom:4px;
}
.st-ex-desc{
  font-size:11px;
  letter-spacing:.14em;
  color:var(--gy);
  font-family:var(--f);
  white-space:nowrap;
  font-style:italic;
}

/* Photo grid inside each exhibition block */
.st-ex-grid{
  flex:1;
  overflow:hidden;
  padding:8px 8px 0;
  display:grid;
  gap:4px;
  align-content:start;
  order:1;
  min-height:0;
}

/* Tile inside statement */
.st-tile{
  background:#e0e0e0;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:opacity .15s;
}
.st-tile:active{opacity:.8}
.st-tile img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block}
.st-tile-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:.1em;color:#c0c0c0}

/* Divider between exhibitions */
.st-ex-divider{
  width:1px;
  background:rgba(0,0,0,.08);
  flex-shrink:0;
  align-self:stretch;
  margin:0 12px;
}

/* ── RESPONSIVE ── */
@media(max-width:767px){
  #navD{display:none!important}
  #navM{display:block}
  #hbM{display:block}
  #hbD{display:none}
  .harr{display:none}
  /* bg is always 100vw, no width override needed */
  .obj-slide{padding:32px 20px 64px}

  .obj-price{font-size:18px}
  .pap-pane{padding:0}
  .pap-price{font-size:20px}
  .dig-proj{padding:0 20px 64px}
}
@media(min-width:768px){
  #navD{display:flex}
  #navM{display:none}
  #hbM{display:none}
  #hbD{display:flex}
  .harr{display:block}
  /* bg width already 100% */
}

  /* Statement */
  function openSt(){open('cv')}
  function closeSt(s){if(!s){home();}}

  /* Build Statement text */
  function buildSta(){
    const html=D.statement.map(sec=>{
      if(!sec||typeof sec==='string'){
        // legacy plain string fallback
        return`<div class="sta-section"><p>${sec}</p></div>`;
      }
      let inner='';
      if(sec.edu){
        inner=`<ul class="sta-edu-list">${sec.edu.map(e=>`<li>${e}</li>`).join('')}</ul>`;
      } else {
        inner=(sec.paras||[]).map(p=>`<p>${p}</p>`).join('');
      }
      return`<div class="sta-section"><div class="sta-heading">${sec.heading||''}</div>${inner}</div>`;
    }).join('');
    $('staScroll').innerHTML=`<div class="sta-body">${html}</div>`;
    hsw($('staScroll'), d=>secNav(d));
  }

  /* Build Statement — continuous horizontal strip */
  function buildSt(){
    const po=$('stPO');
    const pt=$('stPT');

    let curX=0; // current translateX in px
    let startX=0,startCurX=0,dragging=false,velX=0,lastX=0,lastT=0;

    function render(x,animate){
      pt.classList.toggle('dragging',!animate);
      pt.style.transform=`translateX(${x}px)`;
    }

    function getTotalWidth(){return pt.scrollWidth - po.offsetWidth}

    function buildContent(){
      pt.innerHTML='';
      D.exhibitions.forEach((ex,ei)=>{
        if(ei>0){
          const div=document.createElement('div');
          div.className='st-ex-divider';
          pt.appendChild(div);
        }

        const block=document.createElement('div');
        block.className='st-ex-block';

        // Footer: desc + name at BOTTOM
        const footer=document.createElement('div');
        footer.className='st-ex-footer';
        if(ex.desc){
          const descEl=document.createElement('div');
          descEl.className='st-ex-desc';
          descEl.textContent=ex.desc;
          footer.appendChild(descEl);
        }
        const nameEl=document.createElement('div');
        nameEl.className='st-ex-name';
        nameEl.textContent=ex.name;
        footer.appendChild(nameEl);
        block.appendChild(footer);

        // Build mosaic grid from all tiles across all panes
        const allTiles=ex.panes.flatMap(p=>p.tiles);

        // Grid container
        const grid=document.createElement('div');
        grid.className='st-ex-grid';

        // Determine grid width based on tile count / composition
        // Use 4-col grid, block width = 4 * cellSize
        // We'll set block width dynamically after layout
        grid.style.gridTemplateColumns='repeat(4,1fr)';

        allTiles.forEach((t,ti)=>{
          const id=`st-${ei}-${ti}`;
          const tile=document.createElement('div');
          tile.className='st-tile';
          tile.id=id;
          tile.dataset.sz=t.sz||'S';

          // Helper to apply size styles
          function applySize(el,sz){
            if(sz==='M'){el.style.gridColumn='span 2';el.style.gridRow='';el.style.aspectRatio='2'}
            else if(sz==='L'){el.style.gridColumn='span 2';el.style.gridRow='span 2';el.style.aspectRatio='1'}
            else{el.style.gridColumn='span 1';el.style.gridRow='';el.style.aspectRatio='1'}
          }
          applySize(tile, tile.dataset.sz);

          // Click: cycle size S→M→L→S
          tile.addEventListener('click',()=>{
            tile.dataset.sz={S:'M',M:'L',L:'S'}[tile.dataset.sz]||'S';
            applySize(tile, tile.dataset.sz);
          });

          if(t.image){
            const img=document.createElement('img');
            img.src=t.image;img.alt='';
            img.onerror=()=>img.remove();
            tile.appendChild(img);
          } else {
            const ph=document.createElement('div');
            ph.className='st-tile-ph';
            ph.textContent=t.text||'';
            tile.appendChild(ph);
          }
          grid.appendChild(tile);
        });

        block.appendChild(grid);
        pt.appendChild(block);
      });
    }

    buildContent();

    // Rebuild on panel open / resize
    const resizeObs=new ResizeObserver(()=>{
      const maxX=getTotalWidth();
      curX=Math.max(-maxX,Math.min(0,curX));
      render(curX,false);
    });
    resizeObs.observe(po);

    function snap(x,vel){
      const maxX=getTotalWidth();
      let target=x+vel*8; // momentum
      // Rubber band at edges
      if(target>0)target=0;
      if(target<-maxX)target=-maxX;
      curX=target;
      render(curX,true);
    }

    // Touch
    po.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;startCurX=curX;
      lastX=startX;lastT=Date.now();velX=0;
      pt.classList.add('dragging');
    },{passive:true});
    po.addEventListener('touchmove',e=>{
      const now=Date.now();
      const dx=e.touches[0].clientX-startX;
      velX=(e.touches[0].clientX-lastX)/(now-lastT||1)*16;
      lastX=e.touches[0].clientX;lastT=now;
      const maxX=getTotalWidth();
      let nx=startCurX+dx;
      // Rubber band
      if(nx>0)nx=nx*0.3;
      if(nx<-maxX)nx=-maxX+(nx+maxX)*0.3;
      render(nx,false);
    },{passive:true});
    po.addEventListener('touchend',e=>{
      const cur=parseFloat((pt.style.transform||'').replace('translateX(','').replace('px)',''))||0;
      snap(cur,velX);
    },{passive:true});

    // Mouse
    po.addEventListener('mousedown',e=>{
      dragging=true;startX=e.clientX;startCurX=curX;
      lastX=startX;lastT=Date.now();velX=0;
      pt.classList.add('dragging');
      e.preventDefault();
    });
    window.addEventListener('mousemove',e=>{
      if(!dragging)return;
      const now=Date.now();
      const dx=e.clientX-startX;
      velX=(e.clientX-lastX)/(now-lastT||1)*16;
      lastX=e.clientX;lastT=now;
      const maxX=getTotalWidth();
      let nx=startCurX+dx;
      if(nx>0)nx=nx*0.3;
      if(nx<-maxX)nx=-maxX+(nx+maxX)*0.3;
      render(nx,false);
    });
    window.addEventListener('mouseup',()=>{
      if(!dragging)return;dragging=false;
      const cur=parseFloat((pt.style.transform||'').replace('translateX(','').replace('px)',''))||0;
      snap(cur,velX);
    });
  }
  function mvObj(d){resetZoom();
    if(d===1&&oI>=D.objects.length-1){secNav(1);return;}
    if(d===-1&&oI===0){secNav(-1);return;}
    oI=cl(oI+d,0,D.objects.length-1);$('objTrk').style.transform=`translateX(-${oI*100}%)`;updOA();
  }
  function updOA(){$('oPrev').classList.toggle('dis',oI===0);$('oNext').classList.toggle('dis',oI>=D.objects.length-1)}

  /* Paper */
  function getPapList(){return papReversed?[...D.paper].reverse():D.paper}
  function mvPap(d){resetZoom();
    const list=getPapList();
    if(d===1&&pI>=list.length-1){secNav(1);return;}
    if(d===-1&&pI===0){secNav(-1);return;}
    pI=cl(pI+d,0,list.length-1);$('papTrk').style.transform=`translateX(-${pI*100}%)`;updPA();
  }
  function updPA(){const list=getPapList();$('pPrev').classList.toggle('dis',pI===0);$('pNext').classList.toggle('dis',pI>=list.length-1)}
  function togglePapOrder(){
    papReversed=!papReversed;
    $('pbChrono').classList.toggle('act',papReversed);
    pI=0; buildPap(); $('papTrk').style.transform='translateX(0)'; updPA();
  }

  /* Build Objects */
  function buildObj(){
    const trk=$('objTrk');
    // aspect ratios: h=A5 landscape, v=A5 portrait, sq=square
    const AR={h:'297/210',v:'210/297',sq:'1/1'};
    trk.style.cssText='display:flex;height:100%;transition:transform .5s cubic-bezier(.77,0,.175,1)';
    trk.innerHTML=D.objects.map((o,i)=>{
      const ar=AR[o.orient||'h']||AR.h;
      return`
      <div class="obj-slide">
        <div class="obj-img">${o.image?`<img src="${clOpt(o.image)}" alt="${o.title}">`:`<div style="aspect-ratio:${ar};background:#e4e4e4;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.1em;color:#c0c0c0">изображение</div>`}</div>
        <div class="obj-info">
          <div class="obj-row">
            <div><div class="obj-title">${o.title}</div><div class="obj-desc">${o.meta.replace(/\n/g,'<br>')}</div></div>
            <div class="obj-pr"><span class="obj-price">${o.price}</span><button class="star" onclick="APP.ann('oa${i}')">*</button></div>
          </div>
          <div class="ann" id="oa${i}">${o.ann}</div>
        </div>
      </div>`;}).join('');
    updOA();
    setTimeout(()=>trk.querySelectorAll('.obj-img img').forEach(attachZoom),100);
  }

  /* Build Paper */
  function buildPap(){
    const trk=$('papTrk');
    const papList=getPapList();
    trk.innerHTML=papList.map((s,i)=>{
      const realIdx=D.paper.indexOf(s);
      const w=s.works[0];
      const oc=w.size==='A6'?(( w.orient||'h')==='h'?'orient-h6':'orient-v6'):((w.orient||'h')==='h'?'orient-h':'orient-v');
      return`
      <div class="pap-pane" id="pp${i}">
        <div class="pap-layout">
          <div class="pap-row">
            <div class="pap-img ${oc}">${w.image?`<img src="${clOpt(w.image)}" alt="${w.title}">`:`<div style="width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.1em;color:#c0c0c0">изображение</div>`}</div>
            <div class="pap-info">
              <div class="pap-title">${w.title}</div>
              <a class="pap-sl" onclick="APP.openSeries(${realIdx})">к серии →</a>
              <div class="pap-d">${w.desc.replace(/\n/g,'<br>')}</div>
              <div class="pap-d">${w.fmt}</div>
              <div class="pap-d">${w.yr}</div>
              <div class="pap-pr"><span class="pap-price">${w.price}</span><button class="star" onclick="APP.ann('pa${realIdx}')">*</button></div>
            </div>
          </div>
          <div class="ann-pap" id="pa${realIdx}">${w.ann}</div>
        </div>
      </div>`;}).join('');
    updPA();
    setTimeout(()=>trk.querySelectorAll('.pap-img img').forEach(attachZoom),100);
  }

  /* Series */
  let sI=0, curSeries=-1, seriesMoving=false;
  function openSeries(seriesIdx){
    curSeries=seriesIdx; sI=0;
    const s=D.paper[seriesIdx];
    $('papSeriesName').textContent=s.name||'';
    buildSeriesSlides(s);
    $('papSeries').classList.add('open');
    // hide background arrows
    $('pPrev').style.display='none';
    $('pNext').style.display='none';
  }
  function closeSeries(){
    $('papSeries').classList.remove('open');
    $('pPrev').style.display='';
    $('pNext').style.display='';
    curSeries=-1;
  }
  function buildSeriesSlides(s){
    const trk=$('papSeriesTrk');
    trk.style.cssText='display:flex;height:100%;transition:transform .5s cubic-bezier(.77,0,.175,1)';
    const workSlides=s.works.map((w,wi)=>{
      const oc=w.size==='A6'?(w.orient==='h'?'orient-h6':'orient-v6'):(w.orient==='h'?'orient-h':'orient-v');
      const sid=`sr-${curSeries}-${wi}`;
      return`<div class="pap-series-slide">
        <div class="pap-series-layout">
          <div class="pap-series-img ${oc}">${w.image
            ?`<img src="${clOpt(w.image)}" alt="${w.title}">`
            :`<div style="width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.1em;color:#c0c0c0">изображение</div>`
          }</div>
          <div class="pap-series-info">
            <div class="pap-series-row">
              <div>
                <div class="pap-series-title">${w.title}</div>
                <div class="pap-series-meta">${w.desc.replace(/\n/g,'<br>')}<br>${w.fmt}<br>${w.yr}</div>
              </div>
              <div class="pap-series-pr">
                <span class="pap-series-price">${w.price}</span>
                <button class="star" onclick="APP.ann('${sid}')">*</button>
              </div>
            </div>
            <div class="ann-pap" id="${sid}">${w.ann||''}</div>
          </div>
        </div>
      </div>`;});
    const descSlide=(s.desc&&s.desc.trim())?`<div class="pap-series-slide"><div class="pap-series-layout"><div class="pap-series-desc-block">${s.desc.replace(/\n/g,'<br>')}</div></div></div>`:'';
    trk.innerHTML=workSlides.join('')+descSlide;
    trk.style.transform='translateX(0)';
    hsw(trk, d=>mvSeries(d));
    setTimeout(()=>trk.querySelectorAll('.pap-series-img img').forEach(attachZoom),100);
    updSA(s);
  }
  function mvSeries(d){resetZoom();
    if(curSeries<0||seriesMoving)return;
    const s=D.paper[curSeries];
    sI=cl(sI+d,0,s.works.length-1);
    $('papSeriesTrk').style.transform=`translateX(-${sI*100}%)`;
    updSA(s);
    seriesMoving=true;setTimeout(()=>seriesMoving=false,520);
  }
  function updSA(s){
    const total=s.works.length+((s.desc&&s.desc.trim())?1:0);
    $('sPrev').classList.toggle('dis',sI===0);
    $('sNext').classList.toggle('dis',sI>=total-1);
  }

    if(d===1&&dI>=D.digital.length-1){secNav(1);return;}
    if(d===-1&&dI===0){secNav(-1);return;}
    dI=cl(dI+d,0,D.digital.length-1);

  /* Build Digital */
  function buildDig(){
    const trk=$('digTrk');
    trk.style.cssText='display:flex;height:100%;transition:transform .5s cubic-bezier(.77,0,.175,1)';
    trk.innerHTML=D.digital.map((p,pi)=>{
      const bgStyle=p.bg?`background-image:url('${clOpt(p.bg)}')`:'';
      const blocksHtml=(p.blocks||[]).map(b=>{
        if(b.type==='text') return`<div class="dig-block-text">${b.content.split('\n\n').map(t=>`<p>${t}</p>`).join('')}</div>`;
        if(b.type==='image'&&b.src) return`<div class="dig-block-img"><img src="${clOpt(b.src)}" alt="" onerror="this.parentElement.remove()"></div>`;
        return'';
      }).join('');
      const linkHtml=p.link?`<a class="dig-link" href="${p.link}" target="_blank">${p.linkLabel||'подробнее →'}</a>`:'';
      return`<div class="dig-slide" ${bgStyle?`style="${bgStyle}"`:''}>
        <div class="dig-inner">
          ${p.h?`<div class="dig-h">${p.h}</div>`:''}
          ${p.sub?`<div class="dig-sub">${p.sub}</div>`:''}
          ${blocksHtml}
          ${linkHtml}
        </div>
      </div>`;
    }).join('');
    setTimeout(()=>trk.querySelectorAll('.dig-block-img img').forEach(attachZoom),100);
    updDA();
  }

  function ann(id){const el=document.getElementById(id);if(el)el.classList.toggle('on')}

  function hsw(el,cb){
    let sx=0,sy=0,busy=false;
    el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
    el.addEventListener('touchend',e=>{
      if(busy)return; // debounce double-fire
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
        busy=true; setTimeout(()=>busy=false,400);
        cb(dx>0?-1:1);
      }
    },{passive:true});
  }
  function cl(v,a,b){return Math.max(a,Math.min(b,v))}

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){if(curSeries>=0)closeSeries();else home();}
    if(sec==='obj'){if(e.key==='ArrowRight')mvObj(1);if(e.key==='ArrowLeft')mvObj(-1)}
    if(sec==='pap'){
      if(curSeries>=0){if(e.key==='ArrowRight')mvSeries(1);if(e.key==='ArrowLeft')mvSeries(-1)}
      else{if(e.key==='ArrowRight')mvPap(1);if(e.key==='ArrowLeft')mvPap(-1)}
    }
  });
  window.addEventListener('resize',()=>{bgImg.style.objectPosition='center'});

  document.addEventListener('DOMContentLoaded',init);
  if(document.readyState!=='loading')init();

  /* ══ LIGHTBOX ══ */
  const ZOOM=(()=>{
    const ov=$('zoomOv');
    const imgEl=$('zoomOvImg');
    const PAD=24;
    let srcs=[], cur=0, loading=false;
    let scale=1, tx=0, ty=0;
    // pinch
    let p0=null,p1=null,startScale=1,startDist=0,startMidX=0,startMidY=0,startTx=0,startTy=0;
    // pan (1 finger when zoomed)
    let pan1=false,pan1x=0,pan1y=0,pan1tx=0,pan1ty=0;
    // swipe between images (1 finger at fit scale)
    let swX=0,swY=0,swAxis=null,swDx=0,swMoved=false;
    // tap detection
    let tapX=0,tapY=0;

    function dist2(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
    function mid2(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};}

    function applyT(animate){
      imgEl.style.transition=animate?'transform .22s cubic-bezier(.25,.46,.45,.94)':'none';
      imgEl.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    }

    function doFit(){
      const W=ov.offsetWidth, H=ov.offsetHeight;
      const nw=imgEl.naturalWidth, nh=imgEl.naturalHeight;
      if(!nw||!nh) return;
      scale=Math.min((W-PAD*2)/nw,(H-PAD*2)/nh);
      tx=(W-nw*scale)/2;
      ty=(H-nh*scale)/2;
      applyT(false);
    }

    function fitScale(){
      const nw=imgEl.naturalWidth||1,nh=imgEl.naturalHeight||1;
      return Math.min((ov.offsetWidth-PAD*2)/nw,(ov.offsetHeight-PAD*2)/nh);
    }

    function clamp(){
      const W=ov.offsetWidth,H=ov.offsetHeight;
      const iw=(imgEl.naturalWidth||1)*scale,ih=(imgEl.naturalHeight||1)*scale;
      if(iw<=W){tx=(W-iw)/2;}else{tx=Math.max(W-iw,Math.min(0,tx));}
      if(ih<=H){ty=(H-ih)/2;}else{ty=Math.max(H-ih,Math.min(0,ty));}
    }

    function loadSrc(src,onready){
      if(loading) return;
      loading=true;
      imgEl.style.opacity='0';
      imgEl.style.transition='none';
      imgEl.style.transform='none';
      scale=1; tx=0; ty=0;
      // Preload via Image() so naturalWidth is guaranteed when we set imgEl.src
      const tmp=new Image();
      tmp.onload=tmp.onerror=()=>{
        imgEl.src=src;
        requestAnimationFrame(()=>{
          loading=false;
          onready();
        });
      };
      tmp.src=src;
    }

    function showFitted(){
      doFit();
      imgEl.style.transition='opacity .18s';
      imgEl.style.opacity='1';
    }

    function open(srcList,idx){
      srcs=srcList; cur=idx;
      ov.classList.add('on');
      loadSrc(srcs[cur],showFitted);
    }

    function close(){
      ov.classList.remove('on');
      loading=false;
      srcs=[]; cur=0; scale=1; tx=0; ty=0;
      imgEl.style.opacity='0';
      imgEl.src='';
    }

    function goTo(idx){
      cur=idx;
      loadSrc(srcs[cur],showFitted);
    }

    // Desktop: click backdrop closes
    ov.addEventListener('click',e=>{
      if(e.target===ov||e.target===$('zoomOvBg')) close();
    });

    // Touch
    ov.addEventListener('touchstart',e=>{
      e.preventDefault();
      const t=e.touches;
      if(t.length===2){
        pan1=false; swAxis=null; swMoved=false;
        p0=t[0]; p1=t[1];
        startDist=dist2(p0,p1);
        startScale=scale; startTx=tx; startTy=ty;
        const m=mid2(p0,p1);
        startMidX=m.x; startMidY=m.y;
      } else if(t.length===1){
        p1=null;
        tapX=t[0].clientX; tapY=t[0].clientY;
        const atFit=scale<=(fitScale()*1.05);
        if(atFit){
          swX=t[0].clientX; swY=t[0].clientY;
          swAxis=null; swDx=0; swMoved=false; pan1=false;
        } else {
          pan1=true;
          pan1x=t[0].clientX; pan1y=t[0].clientY;
          pan1tx=tx; pan1ty=ty; swAxis=null;
        }
      }
    },{passive:false});

    ov.addEventListener('touchmove',e=>{
      e.preventDefault();
      const t=e.touches;
      if(t.length===2&&p1!==null){
        const d=dist2(t[0],t[1]);
        const m=mid2(t[0],t[1]);
        const ns=Math.max(0.5,Math.min(8,startScale*(d/startDist)));
        const r=ns/startScale;
        tx=m.x-(startMidX-startTx)*r;
        ty=m.y-(startMidY-startTy)*r;
        scale=ns;
        applyT(false);
      } else if(t.length===1){
        if(pan1){
          tx=pan1tx+(t[0].clientX-pan1x);
          ty=pan1ty+(t[0].clientY-pan1y);
          clamp(); applyT(false);
        } else {
          const ddx=t[0].clientX-swX;
          const ddy=t[0].clientY-swY;
          if(!swAxis&&(Math.abs(ddx)>8||Math.abs(ddy)>8)){
            swAxis=Math.abs(ddx)>Math.abs(ddy)?'x':'y';
          }
          if(swAxis==='x'){
            swDx=ddx; swMoved=true;
            imgEl.style.transition='none';
            imgEl.style.transform=`translate(${tx+ddx*0.38}px,${ty}px) scale(${scale})`;
          }
        }
      }
    },{passive:false});

    ov.addEventListener('touchend',e=>{
      e.preventDefault();
      if(e.touches.length===0){
        if(pan1){
          clamp(); applyT(true);
          pan1=false;
        } else if(swAxis==='x'){
          if(swMoved&&Math.abs(swDx)>55){
            const next=cur+(swDx<0?1:-1);
            if(next>=0&&next<srcs.length) goTo(next);
            else applyT(true);
          } else {
            applyT(true);
          }
          swAxis=null; swMoved=false; swDx=0;
        } else {
          // tap: check if moved less than 8px (genuine tap, not drift)
          const ct=e.changedTouches[0];
          const moved=Math.hypot(ct.clientX-tapX,ct.clientY-tapY);
          if(moved<8){
            // close if tap outside image bounds (computed from tx/ty/scale)
            const nw=imgEl.naturalWidth,nh=imgEl.naturalHeight;
            const onImg=ct.clientX>=tx&&ct.clientX<=tx+nw*scale&&ct.clientY>=ty&&ct.clientY<=ty+nh*scale;
            if(!onImg) close();
          }
        }
        p1=null;
      } else if(e.touches.length===1&&p1!==null){
        // one finger lifted from pinch → switch to pan
        p1=null; pan1=true;
        pan1x=e.touches[0].clientX; pan1y=e.touches[0].clientY;
        pan1tx=tx; pan1ty=ty;
        clamp(); applyT(false);
      }
    },{passive:false});

    document.addEventListener('keydown',e=>{
      if(!ov.classList.contains('on')) return;
      if(e.key==='Escape') close();
      if(e.key==='ArrowRight'&&cur<srcs.length-1) goTo(cur+1);
      if(e.key==='ArrowLeft'&&cur>0) goTo(cur-1);
    });

    return{open,close,isOpen:()=>ov.classList.contains('on')};
  })();

  // Collect all images in same container as siblings
  function attachZoom(imgElNode){
    if(!imgElNode||!imgElNode.src||imgElNode.dataset.zb) return;
    imgElNode.dataset.zb='1';
    imgElNode.style.cursor='zoom-in';
    imgElNode.addEventListener('click',e=>{
      e.stopPropagation();
      // gather sibling images in same track/slide
      const container=imgElNode.closest('.obj-slide,.pap-pane,.pap-series-slide,.dig-slide')||document;
      const all=[...container.querySelectorAll('img[data-zb]')].filter(i=>i.src&&!i.src.endsWith('#'));
      const idx=all.indexOf(imgElNode);
      ZOOM.open(all.map(i=>i.src), idx<0?0:idx);
    });
  }

  function resetZoom(){if(ZOOM.isOpen()) ZOOM.close();}

    function rebuild(){
      // Re-render all sections with current D data, then reset to home
      buildObj(); buildPap(); buildDig(); buildSta(); buildSt();
      home();
    }
    return{open,close,home,toggle,rebuild,openSt,closeSt,secNav,mvObj,mvPap,mvDig,mvSeries,openSeries,closeSeries,ann,togglePapOrder};
})();
</script>
